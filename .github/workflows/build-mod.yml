name: Build MTR Web Map Mod

on:
  push:
    branches: [ main ]
    paths:
      - 'mtr-webmap-mod/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Compile mtrwebmap.jar

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mtr-webmap-mod/build.gradle') }}
          restore-keys: gradle-

      - name: Rendre gradlew executable
        run: chmod +x mtr-webmap-mod/gradlew

      - name: Compiler le mod
        working-directory: mtr-webmap-mod
        run: ./gradlew build --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx2g"

      - name: Uploader le JAR compile
        uses: actions/upload-artifact@v4
        with:
          name: mtrwebmap-jar
          path: mtr-webmap-mod/build/libs/mtrwebmap-*.jar
          retention-days: 30

      - name: Succes
        run: |
          echo "Le mod est compile !"
          ls -lh mtr-webmap-mod/build/libs/*.jar
