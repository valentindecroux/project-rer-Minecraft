name: 🔨 Build MTR Web Map Mod

on:
  push:
    branches: [ main ]
    paths:
      - 'mtr-webmap-mod/**'
  workflow_dispatch:   # bouton "Run workflow" manuel sur GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    name: Compile mtrwebmap.jar

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: ☕ Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mtr-webmap-mod/build.gradle') }}
          restore-keys: gradle-

      - name: 🔧 Installer Gradle 7.6.3 et régénérer le wrapper
        working-directory: mtr-webmap-mod
        run: |
          # Télécharger Gradle 7.6.3 (compatible ForgeGradle 5.1.x)
          wget -q https://services.gradle.org/distributions/gradle-7.6.3-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          # Régénérer gradlew avec le bon wrapper
          /tmp/gradle-7.6.3/bin/gradle wrapper --gradle-version=7.6.3 --distribution-type=bin
          chmod +x gradlew

      - name: 🏗️ Compiler le mod
        working-directory: mtr-webmap-mod
        run: ./gradlew build --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx2g"

      - name: 📤 Uploader le JAR compilé
        uses: actions/upload-artifact@v4
        with:
          name: mtrwebmap-jar
          path: mtr-webmap-mod/build/libs/mtrwebmap-*.jar
          retention-days: 30

      - name: ✅ Succès !
        run: |
          echo "Le mod est compilé !"
          ls -lh mtr-webmap-mod/build/libs/*.jar
